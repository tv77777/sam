<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تخمين الرقم | Number Guessing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .game-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            flex: 1;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .message-area {
            background: #f7f7f7;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
            border-right: 4px solid #667eea;
        }

        .message {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .hint {
            font-size: 0.9rem;
            color: #666;
        }

        .input-area {
            margin-bottom: 25px;
        }

        .guess-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
            font-family: monospace;
            font-size: 1.3rem;
        }

        .guess-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-guess {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-guess:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #ff6b6b;
            color: white;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            background: #ff5252;
        }

        .history {
            background: #f7f7f7;
            border-radius: 15px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }

        .history-list {
            list-style: none;
            padding: 0;
        }

        .history-item {
            padding: 8px;
            margin: 5px 0;
            background: white;
            border-radius: 8px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .history-item.high {
            border-right: 3px solid #ff6b6b;
            color: #ff6b6b;
        }

        .history-item.low {
            border-right: 3px solid #51cf66;
            color: #51cf66;
        }

        .history-item.success {
            border-right: 3px solid #ffd93d;
            color: #ffd93d;
            font-weight: bold;
        }

        .range-info {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .game-container {
                padding: 25px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .stat-value {
                font-size: 1.2rem;
            }
            
            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="game-icon">🎮</div>
            <h1>لعبة تخمين الرقم</h1>
            <div class="subtitle">Number Guessing Game</div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">المحاولات</div>
                <div class="stat-value" id="attempts">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">أفضل نتيجة</div>
                <div class="stat-value" id="bestScore">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">المدى</div>
                <div class="stat-value" id="range">1-100</div>
            </div>
        </div>

        <div class="message-area">
            <div class="message" id="message">✨ خمن الرقم بين 1 و 100 ✨</div>
            <div class="hint" id="hint"></div>
        </div>

        <div class="input-area">
            <input type="number" id="guessInput" class="guess-input" placeholder="أدخل رقمك هنا..." min="1" max="100">
        </div>

        <div class="buttons">
            <button class="btn-guess" onclick="makeGuess()">🔍 خمن</button>
            <button class="btn-reset" onclick="resetGame()">🔄 لعبة جديدة</button>
        </div>

        <div class="history">
            <div class="history-title">📝 سجل المحاولات</div>
            <ul class="history-list" id="historyList">
                <li style="text-align: center; color: #999;">لا توجد محاولات بعد</li>
            </ul>
        </div>
        <div class="range-info">
            💡 نصيحة: الرقم بين 1 و 100
        </div>
    </div>

    <script>
        let secretNumber = null;
        let attempts = 0;
        let bestScore = localStorage.getItem('bestScore') ? parseInt(localStorage.getItem('bestScore')) : null;
        let guessHistory = [];

        // Initialize game
        function initGame() {
            secretNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            guessHistory = [];
            updateAttemptsDisplay();
            updateMessage('✨ خمن الرقم بين 1 و 100 ✨', '');
            updateHistoryDisplay();
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').disabled = false;
            document.querySelector('.btn-guess').disabled = false;
            
            if (bestScore) {
                document.getElementById('bestScore').textContent = bestScore;
            } else {
                document.getElementById('bestScore').textContent = '-';
            }
            
            console.log('Secret number (for testing):', secretNumber); // يمكن إزالة هذا السطر في الإصدار النهائي
        }

        // Update attempts display
        function updateAttemptsDisplay() {
            document.getElementById('attempts').textContent = attempts;
        }

        // Update message
        function updateMessage(message, hint = '') {
            document.getElementById('message').textContent = message;
            document.getElementById('hint').textContent = hint;
        }

        // Update history display
        function updateHistoryDisplay() {
            const historyList = document.getElementById('historyList');
            if (guessHistory.length === 0) {
                historyList.innerHTML = '<li style="text-align: center; color: #999;">لا توجد محاولات بعد</li>';
                return;
            }
            
            historyList.innerHTML = guessHistory.map(item => {
                let className = '';
                let arrow = '';
                if (item.type === 'high') {
                    className = 'high';
                    arrow = '⬆️';
                } else if (item.type === 'low') {
                    className = 'low';
                    arrow = '⬇️';
                } else {
                    className = 'success';
                    arrow = '🎉';
                }
                return `<li class="history-item ${className}">${arrow} ${item.value} - ${item.message}</li>`;
            }).join('');
            
            // Auto scroll to bottom
            const historyContainer = document.querySelector('.history');
            historyContainer.scrollTop = historyContainer.scrollHeight;
        }

        // Update best score
        function updateBestScore() {
            if (bestScore === null || attempts < bestScore) {
                bestScore = attempts;
                localStorage.setItem('bestScore', bestScore);
                document.getElementById('bestScore').textContent = bestScore;
                return true;
            }
            return false;
        }

        // Make a guess
        function makeGuess() {
            const input = document.getElementById('guessInput');
            const guess = parseInt(input.value);
            
            // Validation
            if (isNaN(guess) || guess < 1 || guess > 100) {
                updateMessage('⚠️ الرجاء إدخال رقم صحيح بين 1 و 100 ⚠️', '');
                input.value = '';
                input.focus();
                return;
            }
            
            attempts++;
            updateAttemptsDisplay();
            
            let message = '';
            let hint = '';
            let historyType = '';
            let historyMessage = '';
            
            if (guess === secretNumber) {
                // Winner!
                message = `🎉 مبروك! لقد فزت! 🎉 الرقم كان ${secretNumber}`;
                hint = `لقد استخدمت ${attempts} محاولة${attempts > 1 ? 'ات' : ''}`;
                historyType = 'success';
                historyMessage = `🎉 نجاح! الرقم ${guess} صحيح! 🎉`;
                updateMessage(message, hint);
                
                // Update best score
                const isNewRecord = updateBestScore();
                if (isNewRecord && attempts === bestScore) {
                    updateMessage(message, `🏆 رقم قياسي جديد! ${attempts} محاولة${attempts > 1 ? 'ات' : ''} 🏆`);
                }
                
                // Disable input and button
                document.getElementById('guessInput').disabled = true;
                document.querySelector('.btn-guess').disabled = true;
                
                // Add celebration effect
                celebrate();
                
            } else if (guess > secretNumber) {
                message = '📈 الرقم كبير جداً!';
                hint = `جرب رقماً أصغر من ${guess}`;
                historyType = 'high';
                historyMessage = `📈 ${guess} - كبير جداً`;
                updateMessage(message, hint);
            } else {
                message = '📉 الرقم صغير جداً!';
                hint = `جرب رقماً أكبر من ${guess}`;
                historyType = 'low';
                historyMessage = `📉 ${guess} - صغير جداً`;
                updateMessage(message, hint);
            }
            
            // Add to history
            guessHistory.push({
                value: guess,
                type: historyType,
                message: historyMessage
            });
            updateHistoryDisplay();
            
            // Clear input and focus
            input.value = '';
            input.focus();
        }
        
        // Celebration effect
        function celebrate() {
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9'];
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.innerHTML = ['🎉', '🎊', '✨', '🌟', '💫', '🎈'][Math.floor(Math.random() * 6)];
                particle.style.position = 'fixed';
                particle.style.left = Math.random() * window.innerWidth + 'px';
                particle.style.top = '-20px';
                particle.style.fontSize = (Math.random() * 20 + 20) + 'px';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '9999';
                particle.style.animation = `fall ${Math.random() * 2 + 2}s linear forwards`;
                document.body.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 3000);
            }
        }
        
        // Add falling animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                0% {
                    transform: translateY(-20px) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: translateY(100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        // Reset game
        function resetGame() {
            initGame();
            updateMessage('🔄 تم بدء لعبة جديدة! خمن الرقم بين 1 و 100 🔄', '');
        }
        
        // Add enter key support
        document.getElementById('guessInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                makeGuess();
            }
        });
        
        // Initialize game on load
        initGame();
    </script>
</body>
</html>
